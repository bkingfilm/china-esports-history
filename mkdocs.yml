site_name: 中国电竞幕后史 · ONE MORE WAY
site_description: 第一部记录中国电子竞技二十年幕后故事的书
site_url: https://bkingfilm.github.io/china-esports-history/
repo_url: https://github.com/bkingfilm/china-esports-history
repo_name: bkingfilm/china-esports-history
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: material
  language: zh
  logo: assets/cover.jpg
  favicon: assets/cover.jpg
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  alternate:
    - name: 简体中文
      link: zh/
      lang: zh
    - name: English
      link: en/
      lang: en
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bkingfilm/china-esports-history
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/10500463

copyright: Copyright &copy; BBKinG · CC BY-NC-ND 4.0

